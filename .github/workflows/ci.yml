name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      versions:
        description: "@lvce-editor/server versions or tags. Leave empty to use recent_versions."
        required: false
        default: ""
      recent_versions:
        description: "Number of versions from versions.json to benchmark"
        required: false
        default: "100"
      iterations:
        description: "Measured iterations per version"
        required: false
        default: "10"
      profile:
        description: "Record Playwright traces"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.report.outputs.pages }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Resolve benchmark versions
        id: benchmark-versions
        env:
          VERSIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.versions || '' }}
          RECENT_VERSIONS: ${{ github.event.inputs.recent_versions || '100' }}
        run: npm run ci:resolve-versions
      - uses: actions/cache@v5
        id: server-store-cache
        with:
          path: .tmp/server-store
          key: ${{ runner.os }}-node24-server-store-${{ hashFiles('src/packageManager.ts') }}-${{ steps.benchmark-versions.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-node24-server-store-${{ hashFiles('src/packageManager.ts') }}-
            ${{ runner.os }}-node24-server-store-
      - run: npm run lint
      - run: npm run install-browser:ci
      - run: npm test
      - run: npm run type-check
      - name: Run benchmark
        env:
          VERSIONS: ${{ steps.benchmark-versions.outputs.versions }}
          ITERATIONS: ${{ github.event.inputs.iterations || '10' }}
          PROFILE: ${{ github.event.inputs.profile || 'true' }}
        run: npm run benchmark:ci
      - name: Generate Pages report
        id: report
        if: always()
        run: npm run ci:report
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: lvce-startup-benchmark-results
          path: results/**
      - name: Upload Pages artifact
        if: always() && steps.report.outputs.pages == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: .tmp/pages

  deploy:
    if: always() && needs.benchmark.outputs.pages == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.benchmark.result != 'cancelled'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: benchmark
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
